name: Desktop Build

on:
  # 快速迭代期间暂停自动 CI/CD,仅保留手动触发;恢复时取消下方注释即可
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   tags:
  #     - 'v*.*.*'
  #   paths:
  #     - 'src-tauri/**'
  #     - 'scripts/desktop/**'
  #     - 'agent/**'
  #     - 'frontend/**'
  #     - '.github/workflows/desktop-build.yml'
  #     - 'pyproject.toml'
  # pull_request:
  #   paths:
  #     - 'src-tauri/**'
  #     - 'scripts/desktop/**'
  #     - 'agent/**'
  #     - 'frontend/**'
  #     - '.github/workflows/desktop-build.yml'
  #     - 'pyproject.toml'

permissions:
  contents: write

jobs:
  build:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-aarch64
            rust-target: aarch64-apple-darwin
            asset-pattern: cpython-3.12.*-aarch64-apple-darwin-install_only.tar.gz
            python-bin: bin/python3
            bundle: dmg
            artifact-glob: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            asset-pattern: cpython-3.12.*-x86_64-pc-windows-msvc-install_only.tar.gz
            python-bin: python.exe
            bundle: nsis
            artifact-glob: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            node scripts/desktop/sync-version.mjs "$VERSION"
            echo "desktop_release_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "DESKTOP_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          else
            CURRENT_VERSION="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
            node scripts/desktop/sync-version.mjs "$CURRENT_VERSION" --check
            echo "desktop_release_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Fetch Python Runtime (${{ matrix.target }})
        shell: bash
        env:
          PBS_TAG: '20260610'
          ASSET_PATTERN: ${{ matrix.asset-pattern }}
        run: |
          set -euo pipefail
          echo "Fetching Python runtime for ${{ matrix.target }}..."

          # Resolve the actual asset filename from the GitHub release API.
          # Uses jq for reliable JSON parsing (pre-installed on both runners).
          RELEASE_URL="https://api.github.com/repos/astral-sh/python-build-standalone/releases/tags/${PBS_TAG}"
          echo "Querying release: $RELEASE_URL"
          ASSET_NAME=$(curl -fsSL "$RELEASE_URL" \
            | jq -r --arg pat "${ASSET_PATTERN}" \
              '.assets[] | select(.name | test($pat)) | .name' \
            | head -1)
          if [ -z "$ASSET_NAME" ]; then
            echo "ERROR: No asset matching ${ASSET_PATTERN} found in release ${PBS_TAG}"
            exit 1
          fi
          echo "Resolved asset: $ASSET_NAME"
          DOWNLOAD_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/${ASSET_NAME}"

          OUT_DIR=".desktop-build/python-runtime"
          mkdir -p "$(dirname "$OUT_DIR")"
          tmp="$(mktemp -d)"

          echo "Downloading $DOWNLOAD_URL"
          curl -fsSL "$DOWNLOAD_URL" -o "$tmp/runtime.tar.gz"

          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          # install_only unpacks with a top-level python/ directory; flatten it
          tar -xzf "$tmp/runtime.tar.gz" -C "$tmp"
          mv "$tmp/python/"* "$OUT_DIR/"
          rm -rf "$tmp"

          echo "Runtime ready at: $OUT_DIR"
          "$OUT_DIR/${{ matrix.python-bin }}" --version

      - name: Install Python Dependencies
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_DIR=".desktop-build/python-runtime"
          PY="$RUNTIME_DIR/${{ matrix.python-bin }}"
          REQ_SRC="agent/requirements.txt"

          tmp_req="$(mktemp)"
          grep -viE '^\s*weasyprint' "$REQ_SRC" > "$tmp_req"

          echo "Installing deps into embedded runtime (weasyprint excluded)"
          uv pip install --python "$PY" -r "$tmp_req"
          rm -f "$tmp_req"

          echo "Done. Installed packages:"
          "$PY" -m pip list 2>/dev/null | head -40 || true

          echo "Running embedded runtime smoke checks"
          PYTHONPATH=agent "$PY" scripts/desktop/smoke_imports.py

      - name: Assemble Desktop Resources (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash scripts/desktop/assemble.sh

      - name: Assemble Desktop Resources (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\desktop\assemble.ps1

      - name: Setup Tauri (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install libiconv
          cargo install tauri-cli --version "^2"

      - name: Setup Tauri (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri App
        working-directory: src-tauri
        run: cargo build --release

      - name: Package Tauri App
        working-directory: src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundle }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Vibe-Trading-${{ steps.version.outputs.desktop_release_version }}-${{ matrix.target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    name: Publish Desktop Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Vibe Trading ${TAG_NAME}" \
            --notes "Desktop installers built from ${TAG_NAME}."
